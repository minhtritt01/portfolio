    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="color-scheme" content="dark" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://phanminhtri.dev/#website",
            "url": "https://phanminhtri.dev/",
            "name": "Phan Minh Tri",
            "inLanguage": ["en", "vi"]
          },
          {
            "@type": "Person",
            "@id": "https://phanminhtri.dev/#person",
            "name": "Phan Minh Tri",
            "jobTitle": "Software Engineer",
            "email": "minhtritt01@gmail.com",
            "url": "https://phanminhtri.dev/",
            "image": "https://phanminhtri.dev/avatar.png",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Ho Chi Minh City",
              "addressCountry": "VN"
            },

              "https://github.com/minhtritt01",
              "https://www.linkedin.com/in/minhtritt01/"
            ]
          }
        ]
      }
    </script>

    <!-- Theme detection before first paint (eliminates dark→light FOUC) -->
    <script>
      (function(){var s=localStorage.getItem('theme');var d=s?s==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;var h=document.documentElement;h.classList.toggle('dark',d);h.classList.toggle('light',!d);var m=document.querySelector('meta[name="color-scheme"]');if(m)m.content=d?'dark':'light';var t=document.querySelector('meta[name="theme-color"]');if(t)t.content=d?'#0a0a0a':'#ffffff'})()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
