<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#0A7075"/>

  <!-- Top "provider" source node -->
  <rect x="35" y="10" width="30" height="20" rx="6" fill="white" fill-opacity="0.95"/>

  <!-- Vertical stem down from source -->
  <line x1="50" y1="30" x2="50" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Horizontal branch bar -->
  <line x1="22" y1="44" x2="78" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left branch down -->
  <line x1="22" y1="44" x2="22" y2="58" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center branch down -->
  <line x1="50" y1="44" x2="50" y2="58" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right branch down -->
  <line x1="78" y1="44" x2="78" y2="58" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Three child nodes -->
  <rect x="10" y="58" width="24" height="15" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="38" y="58" width="24" height="15" rx="5" fill="white" fill-opacity="0.85"/>
  <rect x="66" y="58" width="24" height="15" rx="5" fill="white" fill-opacity="0.85"/>

  <!-- Downward inject arrows (small triangles inside child nodes) -->
  <polygon points="22,62 19,67 25,67" fill="#0A7075"/>
  <polygon points="50,62 47,67 53,67" fill="#0A7075"/>
  <polygon points="78,62 75,67 81,67" fill="#0A7075"/>

  <!-- Bottom label dots (representing consumed data) -->
  <circle cx="22" cy="81" r="3.5" fill="white" fill-opacity="0.5"/>
  <circle cx="50" cy="81" r="3.5" fill="white" fill-opacity="0.5"/>
  <circle cx="78" cy="81" r="3.5" fill="white" fill-opacity="0.5"/>
</svg>
